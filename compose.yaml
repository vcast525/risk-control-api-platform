## Docker Compose configuration for the Risk Control API Platform

services:
  database:
    image: postgres:18
    container_name: risk-control-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: risk_control
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d risk_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: risk-control-api
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@database:5432/risk_control
    ports:
      - "8000:8000"

volumes:
  postgres_data: